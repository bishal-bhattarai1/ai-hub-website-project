{% extends 'home/base.html' %}

{% block title %}AI Solution | Submit Review{% endblock %}

{% block content %}
<section class="page-hero reviews-hero">
    <p class="eyebrow">Feedback</p>
    <h1>Share your review</h1>
    <p>Tell us about your experience with AI Solution.</p>
</section>

<section class="section event-reviews">
    <div class="admin-actions">
        <a class="button secondary" href="{% url 'reviews' %}">Back to Reviews</a>
    </div>

    <form class="contact-form review-form review-submit-form" method="post">
        {% csrf_token %}
        <div class="form-header">
            <span class="form-kicker">Share feedback</span>
            <h2>Submit a review</h2>
        </div>
        {{ review_form.as_p }}
        <button type="submit">Submit review</button>
    </form>
</section>
{% endblock %}
